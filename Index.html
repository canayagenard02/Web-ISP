<!DOCTYPE html>
<html>
<head>
  <title>Home | RMR IgniteTech</title>

  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#0f2027;
  color:white;
}

/* ===== NAV ===== */
nav{
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  position:fixed;
  width:100%;
  z-index:1000;
}

nav h2{
  color:#ff7a00;
}

nav ul{
  list-style:none;
  display:flex;
}

nav ul li{
  margin-left:20px;
}

nav ul li a{
  text-decoration:none;
  color:white;
  transition:0.3s;
}

nav ul li a:hover{
  color:#ff7a00;
}

/* ===== SLIDER ===== */
.slider{
  width:100%;
  height:100vh;
  overflow:hidden;
  position:relative;
}

.slides{
  display:flex;
  width:300%;
  height:100%;
  animation: slide 12s infinite;
}

.slides img{
  width:100%;
  height:100vh;
  object-fit:cover;
}

/* DARK OVERLAY */
.slider::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background: rgba(0,0,0,0.6);
}

/* SLIDER ANIMATION */
@keyframes slide{
  0% { transform: translateX(0%); }
  30% { transform: translateX(0%); }

  35% { transform: translateX(-100%); }
  65% { transform: translateX(-100%); }

  70% { transform: translateX(-200%); }
  100% { transform: translateX(-200%); }
}

/* ===== HERO TEXT ===== */
.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:2;
}

.hero-text h1{
  font-size:45px;
}

.hero-text span{
  color:#ff7a00;
}

.hero-text p{
  margin-top:15px;
  font-size:18px;
}

.hero-text .btn{
  margin-top:20px;
  padding:12px 25px;
  background:#ff7a00;
  color:white;
  border:none;
  border-radius:25px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

.hero-text .btn:hover{
  background:#ffb347;
}

/* ===== SECTION ===== */
section{
  padding:60px 20px;
  text-align:center;
}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.feature-box{
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.feature-box:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #ff7a00;
}

/* FOOTER */
footer{
  background:black;
  text-align:center;
  padding:15px;
  margin-top:40px;
}

/* MOBILE */
@media(max-width:600px){
  .hero-text h1{
    font-size:28px;
  }
}
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>RMR IgniteTech</h2>
  <ul>
    <li><a href="Index.html">Home</a></li>
    <li><a href="Plans.html">Plans</a></li>
    <li><a href="Services.html">Services</a></li>
    <li><a href="About.html">About</a></li>
  </ul>
</nav>

<!-- SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="image 1.jpg">
    <img src="image 2.jpg">
    <img src="image 1.jpg">
  </div>

  <!-- HERO TEXT -->
  <div class="hero-text">
    <h1>RMR IGNITE<span>TECH</span></h1>
    <p>Fast • Reliable • Affordable Internet</p>
    <button class="btn" onclick="location.href='Plans.html'">View Plans</button>
  </div>
</div>

<!-- FEATURES -->
<section>
  <h2>Why Choose Us?</h2>

  <div class="features">
    <div class="feature-box">
      ⚡ Fast Fiber Internet
    </div>

    <div class="feature-box">
      📶 Stable Connection 24/7
    </div>

    <div class="feature-box">
      🛡 FREE Insurance Included
    </div>

    <div class="feature-box">
      📞 24/7 Customer Support
    </div>
  </div>
</section>

<footer>
  © 2026 RMR IgniteTech 'N Connection
</footer>

</body>
</html>
